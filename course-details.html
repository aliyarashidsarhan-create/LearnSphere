<!DOCTYPE html>
<!-- Define document type as HTML5 -->
<html lang="en">

<head>
  <!-- Set character encoding to support text properly -->
  <meta charset="UTF-8">

  <!-- Make the page responsive on all screen sizes -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Link Font Awesome icons -->
  <link rel="stylesheet" href="./css/all.min.css">

  <!-- Link Bootstrap CSS -->
  <link rel="stylesheet" href="./css/bootstrap.min.css">

  <!-- Link custom project CSS -->
  <link rel="stylesheet" href="./css/style.css">

  
  <title>LearnSphere - Course Details</title>
</head>

<body>
  <!--  navbar will be inserted dynamically -->
  <div id="navbar-container"></div>

  <!-- Main page content -->
  <main class="py-5">
    <div class="container">

      <!-- Section where course main details will appear dynamically from JavaScript -->
      <div id="course-details-container"></div>

    
      <div class="row mt-5">

        <div class="col-lg-8">

          <!-- Card for "What You Will Learn" section -->
          <div class="card p-4 mb-4">
            <h3 class="mb-3">What You Will Learn</h3>

            <!-- Topics list will be added here dynamically -->
            <ul id="topics-list" class="mb-0"></ul>
          </div>

          <!-- Card for mini quiz -->
          <div class="card p-4">
            <h3 class="mb-3">Mini Quiz</h3>

            <!-- Quiz questions will be inserted here dynamically -->
            <form id="quiz-form"></form>

            <!-- Button to submit quiz answers -->
            <button type="button" id="submit-quiz" class="btn btn-warning mt-3">
              Submit Quiz
            </button>

            <!-- Quiz result will appear here -->
            <div id="quiz-result" class="mt-3 fw-bold"></div>
          </div>
        </div>

       
        <div class="col-lg-4">

          <!-- Card for instructor details -->
          <div class="card instructor-card p-4">
            <h4 class="mb-3">Instructor</h4>

            <!-- Instructor details will be inserted dynamically -->
            <div id="instructor-card"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!--  footer will be inserted dynamically -->
  <div id="footer-container"></div>

  <!-- Link Bootstrap JavaScript -->
  <script src="./js/bootstrap.bundle.min.js"></script>

  <!-- Link main project JavaScript -->
  <script src="./js/main.js"></script>

  <!-- Link course details JavaScript -->
  <script src="./js/details.js"></script>
</body>

</html>
