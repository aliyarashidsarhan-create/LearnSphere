<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/all.min.css">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>Document</title>
</head>
<body>
 <div id="navbar-container"></div>

  <main class="py-5">
    <div class="container">
      <h1 class="mb-4">Courses Catalog</h1>

      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <input type="text" id="search-input" class="form-control" placeholder="Search by title or instructor">
        </div>
        <div class="col-md-4">
          <select id="level-filter" class="form-select">
            <option value="All">All Levels</option>
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
          </select>
        </div>
        <div class="col-md-4">
          <select id="sort-filter" class="form-select">
            <option value="default">Sort By</option>
            <option value="rating">Rating High to Low</option>
            <option value="price-low">Price Low to High</option>
            <option value="price-high">Price High to Low</option>
            <option value="duration">Duration Shortest</option>
          </select>
        </div>
      </div>

      <div class="mb-4" id="category-buttons"></div>

      <div class="row g-4" id="courses-container"></div>
    </div>
  </main>

  <div id="footer-container"></div>
    
    <script src="./js/all.min.js"></script>
    <script src="./js/main.js"></script>

</body>
</html>
